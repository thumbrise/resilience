version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      all-go-deps:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /_tools
    schedule:
      interval: daily
    groups:
      tools-deps:
        patterns:
          - "*"